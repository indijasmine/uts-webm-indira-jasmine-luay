<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Mahasiswa</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        th {
            background-color: #ccc;
        }
    </style>
</head>
<body>

<h2>Data Mahasiswa</h2>

<table id="tabelData">
    <thead>
        <tr>
            <th>ID</th>
            <th>NIM</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Points</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
$(document).ready(function() {
    $.ajax({
        url: "https://example.com/api", // GANTI DENGAN API ASLI
        method: "GET",
        dataType: "json",
        success: function(response) {

            // ambil data dari response.data
            let data = response.data;

            let html = "";

            data.forEach(function(item) {
                html += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.nim}</td>
                        <td>${item.nama}</td>
                        <td>${item.kelas}</td>
                        <td>${item.points}</td>
                    </tr>
                `;
            });

            $("#tabelData tbody").html(html);
        },
        error: function() {
            alert("Gagal mengambil data dari API!");
        }
    });
});
</script>

</body>
</html>
